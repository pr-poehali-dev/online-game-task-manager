# Конфиг Nginx для ERA Task Manager.
# Скопируйте в /etc/nginx/sites-available/era, замените ВАШ-ДОМЕН.РУ,
# затем: sudo ln -s /etc/nginx/sites-available/era /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
# После этого получите SSL: sudo certbot --nginx -d ВАШ-ДОМЕН.РУ

server {
    listen 80;
    server_name ВАШ-ДОМЕН.РУ;

    # Статика фронтенда (результат npm run build)
    root /var/www/era/dist;
    index index.html;

    # Backend-функции: /api/tasks, /api/ideas и т.д. → на FastAPI (порт 8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ВАЖНО: пробрасываем кастомный заголовок авторизации
        proxy_set_header X-Auth-Token $http_x_auth_token;
        proxy_read_timeout 60s;
    }

    # SPA: любой неизвестный путь отдаёт index.html (для React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш для статики
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 20M;
}
